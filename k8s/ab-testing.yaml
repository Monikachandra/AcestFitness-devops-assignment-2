# A/B testing often uses Ingress to split traffic based on headers.
# Here we show two versions that can be targeted.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      version: v1
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: v1
    spec:
      containers:
      - name: aceest-fitness
        image: monikachandra/aceest-fitness:v1
        ports:
        - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      version: v2
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: v2
    spec:
      containers:
      - name: aceest-fitness
        image: monikachandra/aceest-fitness:v2
        ports:
        - containerPort: 5000
---
# Service for Version A
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-a
spec:
  selector:
    app: aceest-fitness
    version: v1
  ports:
    - port: 80
      targetPort: 5000
---
# Service for Version B
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-b
spec:
  selector:
    app: aceest-fitness
    version: v2
  ports:
    - port: 80
      targetPort: 5000
