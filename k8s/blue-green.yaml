# Blue Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      color: blue
  template:
    metadata:
      labels:
        app: aceest-fitness
        color: blue
    spec:
      containers:
      - name: aceest-fitness
        image: monikachandra/aceest-fitness:v1
        ports:
        - containerPort: 5000
---
# Green Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      color: green
  template:
    metadata:
      labels:
        app: aceest-fitness
        color: green
    spec:
      containers:
      - name: aceest-fitness
        image: monikachandra/aceest-fitness:v2
        ports:
        - containerPort: 5000
---
# Service pointing to Blue initially
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-bg-service
spec:
  selector:
    app: aceest-fitness
    color: blue # Change this to 'green' to switch traffic
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
