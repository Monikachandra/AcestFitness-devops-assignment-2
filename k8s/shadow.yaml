# Shadow Deployment
# Traffic is mirrored from stable to shadow (usually via Service Mesh like Istio)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
      tier: shadow
  template:
    metadata:
      labels:
        app: aceest-fitness
        tier: shadow
    spec:
      containers:
      - name: aceest-fitness
        image: monikachandra/aceest-fitness:new-feature
        ports:
        - containerPort: 5000
---
# Shadow Service (internal only)
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-shadow-service
spec:
  selector:
    app: aceest-fitness
    tier: shadow
  ports:
    - port: 80
      targetPort: 5000
